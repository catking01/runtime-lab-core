name: Public Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  public-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Compile runtime_lab
        run: python -m compileall runtime_lab

      - name: Run common, kernel, and descriptor tests
        run: python -m pytest tests/common tests/kernel20 tests/descriptors -q

      - name: Run offline provider tests
        run: python -m pytest tests/llm_provider -m 'not live_deepseek' -q

      - name: Run repo context tests
        run: python -m pytest tests/repo_context -q

      - name: Run patch proposal tests
        run: python -m pytest tests/patch_proposal -q

      - name: Run patch apply tests
        run: python -m pytest tests/patch_apply -q

      - name: Run test runner tests
        run: python -m pytest tests/test_runner -q

      - name: Run agent loop tests
        run: python -m pytest tests/agent_loop -q
